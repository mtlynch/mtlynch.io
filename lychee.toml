cache = true
max_cache_age = "45d"
cache_exclude_status = "429, 500.."
no_progress = true
accept = ["100..=103", "200..=299", "403"]
timeout = 5
max_retries = 1
retry_wait_time = 10
max_concurrency = 4
host_concurrency = 1
host_request_interval = "1s"
method = "get"
include_fragments = "anchor-only"
index_files = ["index.html"]
exclude_loopback = true

exclude = [
  # Ignore downloadable/page-bundle assets that Hugo does not publish into public/.
  "\\.(css|js|png|jpe?g|gif|webp|svg|mp4|pdf|txt|xml|ya?ml|nix|lua|py|zst)(\\?.*)?$",
  "Dockerfile\\.(nextcloud|sia)$",
  "^file://.*/collect-debt/full-emails/?$",
  "^file://.*/notes/archivebox/reddit-singlefile\\.html$",
  # Ignore local development-only URLs.
  "^https?://(localhost|raspberrypi)(:|/)",
  # Ignore external URL fragments. Many sites use JavaScript hash routers or
  # generated line anchors that lychee can't reliably verify.
  "^https?://[^#]+#",
  # Ignore URLs that intermittently return bot-blocking responses in CI.
  "//([^.]+\\.)*aliexpress\\.us/",
  "//([^.]+\\.)*amazon\\.com/",
  "//([^.]+\\.)*archive\\.is/",
  "//adage\\.com/",
