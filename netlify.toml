# Redirect common feed endpoints to the site's main RSS feed.
[[redirects]]
  from = "/feed"
  to = "/index.xml"
  status = 301
  force = false
[[redirects]]
  from = "/feed.xml"
  to = "/index.xml"
  status = 301
  force = false
[[redirects]]
  from = "/rss"
  to = "/index.xml"
  status = 301
  force = false

# Enable CORS for RSS feeds.
[[headers]]
  for = "/index.xml"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, HEAD, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type"
